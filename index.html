function sc(row,q){
  if(!q)return 0;
  var t=(row[2]+' '+row[3]+' '+row[4]).toLowerCase();
  var ql=q.toLowerCase().trim();
  if(!ql)return 0;
  if(t.indexOf(ql)!==-1)return 100;
  var ws=ql.split(/\s+/).filter(function(w){return w.length>0;});
  if(ws.length>1&&ws.every(function(w){return t.indexOf(w)!==-1;}))return 85;
  if(ws.some(function(w){return w.length>=2&&t.indexOf(w)!==-1;}))return 60;
  var qi=0;
  for(var i=0;i<t.length&&qi<ql.length;i++)if(t[i]===ql[qi])qi++;
  if(qi===ql.length)return 35;
  return 0;
}

function hl(s,q){
  if(!q||!s)return s||'';
  var ws=q.trim().toLowerCase().split(/\s+/).filter(function(w){return w.length>=2;});
  var r=s;
  for(var i=0;i<ws.length;i++){
    var re=new RegExp('('+ws[i].replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    r=r.replace(re,'<mark>$1</mark>');
  }
  return r;
}

    h+='</tr>';
  }
  if(n>600)h+='<tr><td colspan="13" style="text-align:center;padding:10px;color:#999;font-size:12px">\u0e41\u0e2a\u0e14\u0e07 600 \u0e08\u0e32\u0e01 '+n+' \u0e23\u0e32\u0e22\u0e01\u0e32\u0e23</td></tr>';
  tb.innerHTML=h;
}

document.querySelectorAll('th[data-c]').forEach(function(th){
  th.addEventListener('click',function(){
    var c=th.dataset.c==='0'?'score':th.dataset.c;
    if(sCol===c)sDir*=-1;else{sCol=c;sDir=-1;}
    render();
  });
});

var deb;
document.getElementById('q').addEventListener('input',function(){
  sCol=null;sDir=-1;clearTimeout(deb);deb=setTimeout(render,180);
});

function clr(){document.getElementById('q').value='';sCol=null;sDir=-1;render();}
render();
</script>
</body>
</html>
